<header class="relative flex justify-between items-center p-6">
  <div class="flex font-mono min-w-fit max-sm:w-screen max-md:w-screen max-sm:justify-center max-md:justify-center text-white">
    <h1 class="flex text-3xl max-sm:text-base max-md:text-2xl max-lg:text-xl font-bold">
      <span class="text-(--color-primary)">ronald_barbosa&#64;dev</span>:<span class="text-(--color-text-primary)">~$ portfolio</span><span class="cursor"></span>
    </h1>
  </div>

  <div class="flex">
    <nav class="flex max-sm:hidden items-center me-2">
      <ul class="flex max-sm:hidden items-center">
        <li class="mx-2 text-xl max-sm:flex max-sm:w-full justify-center">
          <a href="/" class="hover:text-(--color-primary) hover:underline underline-offset-8 decoration-2 transition duration-700">Início</a>
        </li>
        <li class="mx-2 text-xl max-sm:flex max-sm:w-full justify-center">
          <a href="/projects" class="hover:text-(--color-primary) hover:underline underline-offset-8 decoration-2 transition duration-700">Projetos</a>
        </li>
        <li class="mx-2 text-xl max-sm:flex max-sm:w-full justify-center">
          <a href="/contact" class="hover:text-(--color-primary) hover:underline underline-offset-8 decoration-2 transition duration-700">Contato</a>
        </li>
      </ul>
    </nav>
    <!-- Hamburger (mobile only) -->
    <button
      (click)="toggleMenu()"
      class="hamburger"
      [attr.aria-label]="menuOpen() ? 'Close menu' : 'Open menu'"
    >
      @if (menuOpen()) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      }
    </button>

    <button
      (click)="toggle()"
      class="theme-toggle theme-toggle-desktop"
      [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      @if (isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon sun">
          <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75zM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59zM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75zM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591zM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18zM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59zM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12zM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591z"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="icon moon">
          <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162z" clip-rule="evenodd"/>
        </svg>
      }
    </button>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <nav class="sm:hidden absolute top-full left-0 right-0 z-50 border-t border-(--color-border) bg-(--color-surface) shadow-lg">
      <ul class="flex flex-col p-4 gap-1">
        <li>
          <a href="/" (click)="closeMenu()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-lg font-medium hover:bg-(--color-accent-subtle) hover:text-(--color-primary) transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            Início
          </a>
        </li>
        <li>
          <a href="/projects" (click)="closeMenu()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-lg font-medium hover:bg-(--color-accent-subtle) hover:text-(--color-primary) transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
            </svg>
            Projetos
          </a>
        </li>
        <li>
          <a href="/contact" (click)="closeMenu()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-lg font-medium hover:bg-(--color-accent-subtle) hover:text-(--color-primary) transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="size-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
            Contato
          </a>
        </li>
        <li class="mt-2 pt-3 border-t border-(--color-border)">
          <button
            (click)="toggle()"
            class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-lg font-medium hover:bg-(--color-accent-subtle) hover:text-(--color-primary) transition-colors duration-200"
            [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            @if (isDarkMode()) {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 shrink-0">
                <path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75zM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59zM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75zM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591zM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18zM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59zM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12zM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591z"/>
              </svg>
              Tema claro
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 shrink-0">
                <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 0 1-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 0 1 .818.162z" clip-rule="evenodd"/>
              </svg>
              Tema escuro
            }
          </button>
        </li>
      </ul>
    </nav>
  }
</header>
